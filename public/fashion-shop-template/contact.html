<!DOCTYPE html>
<html lang="en">

<head>
    <title>Zay Shop - Contact</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="apple-touch-icon" href="assets/img/apple-icon.png">
    <link rel="shortcut icon" type="image/x-icon" href="assets/img/favicon.ico">

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/templatemo.css">
    <link rel="stylesheet" href="assets/css/custom.css">

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap">

    <link rel="stylesheet" href="assets/css/fontawesome.min.css">

    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
</head>

<body>

    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-light shadow">
        <div class="container d-flex justify-content-between align-items-center">

            <a class="navbar-brand text-success logo h1 align-self-center" href="#">
                Zay
            </a>

            <ul class="nav navbar-nav d-flex mx-auto">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Shop</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>

        </div>
    </nav>

    <!-- Page Title -->
    <div class="container-fluid bg-light py-5">
        <div class="col-md-6 m-auto text-center">
            <h1 class="h1">Contact Us</h1>
            <p>
                Lorem ipsum dolor sit amet, consectetur adipiscing elit.
            </p>
        </div>
    </div>

    <!-- Map -->
    <div id="mapid" style="width:100%;height:300px;"></div>

    <!-- Contact Form -->
    <div class="container py-5">
        <div class="row py-5">

            <form class="col-md-9 m-auto">

                <div class="row">

                    <div class="form-group col-md-6 mb-3">
                        <label>Name</label>
                        <input type="text" class="form-control" placeholder="Name">
                    </div>

                    <div class="form-group col-md-6 mb-3">
                        <label>Email</label>
                        <input type="email" class="form-control" placeholder="Email">
                    </div>

                </div>

                <div class="mb-3">
                    <label>Subject</label>
                    <input type="text" class="form-control" placeholder="Subject">
                </div>

                <div class="mb-3">
                    <label>Message</label>
                    <textarea class="form-control" rows="8"></textarea>
                </div>

                <div class="row">
                    <div class="col text-end mt-2">
                        <button class="btn btn-outline-success btn-lg px-3">
                            Let’s Talk
                        </button>
                    </div>
                </div>

            </form>

        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-light py-4">
        <div class="container text-center">
            <p>Copyright © 2026 Zay Shop</p>
        </div>
    </footer>


    <!-- Scripts -->
    <script src="assets/js/jquery-1.11.0.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

    <script>
        var map = L.map('mapid').setView([-23.013104, -43.394365], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        L.marker([-23.013104, -43.394365]).addTo(map)
            .bindPopup("<b>Zay Shop</b><br>Location")
            .openPopup();

        map.scrollWheelZoom.disable();
    </script>

</body>

</html>
